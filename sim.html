<!DOCTYPE html>
<html>
<head>
    <title>2D Particle Physics Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>2D Particle Physics Simulator</h1>

    <div id="controls">
        <div class="control">
            <label for="gravitySlider">Gravity: <span id="gravityVal">0.5</span></label>
            <input type="range" id="gravitySlider" min="0" max="2" step="0.05" value="0.5">
        </div>
        <div class="control">
            <label for="restitutionSlider">Bounciness: <span id="restitutionVal">0.8</span></label>
            <input type="range" id="restitutionSlider" min="0" max="1" step="0.05" value="0.8">
        </div>
        <div class="control">
            <label for="countSlider">Particles: <span id="countVal">10</span></label>
            <input type="range" id="countSlider" min="1" max="100" step="1" value="10">
        </div>
        <button id="resetBtn">Reset</button>
    </div>

    <div id="canvasWrap">
        <canvas id="myCanvas" width="800" height="600"></canvas>
    </div>
    <p class="hint">Click and drag a ball, then let go to throw it.</p>

    <script src="sim.js"></script>
</body>
</html>
